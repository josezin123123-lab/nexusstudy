<style>
:root{
  --bg:#050810;--bg2:#0a0f1e;--bg3:#0f1629;
  --card:#111827;--card2:#1a2236;
  --border:#1e2d4a;--border2:#2a3f6a;
  --blue:#1e90ff;--blue2:#00cfff;--blue3:#0050c8;
  --glow:rgba(30,144,255,.18);--glow2:rgba(0,207,255,.12);
  --text:#e8f0fe;--text2:#8fa3c8;--text3:#4a6080;
  --green:#00e676;--orange:#ffab40;--red:#ff5252;--purple:#b388ff;--yellow:#ffd740;
  --font:'Space Grotesk',sans-serif;--font2:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* SIDEBAR */
#sidebar{position:fixed;left:0;top:0;width:72px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;z-index:200;transition:width .3s cubic-bezier(.4,0,.2,1)}
#sidebar:hover{width:224px}
.logo-wrap{width:100%;padding:8px 16px;margin-bottom:20px;overflow:hidden;white-space:nowrap}
.logo-icon{font-family:var(--font2);font-size:22px;font-weight:800;color:var(--blue2);letter-spacing:1px}
.logo-text{font-family:var(--font2);font-size:14px;font-weight:700;color:var(--text2);margin-left:6px;opacity:0;transition:opacity .2s}
#sidebar:hover .logo-text{opacity:1}
.nav-group{width:100%;padding:0 8px;margin-bottom:4px}
.nav-item{width:100%;display:flex;align-items:center;gap:12px;padding:10px 12px;cursor:pointer;border-radius:10px;transition:all .2s;white-space:nowrap;overflow:hidden;color:var(--text2);font-size:13px;font-weight:500;position:relative;text-decoration:none}
.nav-item:hover{background:var(--glow);color:var(--blue2)}
.nav-item.active{background:rgba(30,144,255,.15);color:var(--blue2)}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;background:var(--blue2);border-radius:0 3px 3px 0}
.nav-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.nav-label{font-size:13px;opacity:0;transition:opacity .15s}
#sidebar:hover .nav-label{opacity:1}
.nav-sep{height:1px;background:var(--border);margin:8px 12px}
.sidebar-bottom{margin-top:auto}
.streak-badge{background:rgba(255,171,64,.15);border:1px solid rgba(255,171,64,.3);border-radius:8px;padding:6px 12px;margin:8px;text-align:center;white-space:nowrap;overflow:hidden;font-size:12px;color:var(--orange);display:none}
#sidebar:hover .streak-badge{display:block}

/* MAIN */
#main{margin-left:72px;padding:28px 32px;min-height:100vh;transition:margin .3s}
.page{display:none;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
.page-header h1{font-family:var(--font2);font-size:26px;font-weight:800;color:var(--text)}
.page-header p{color:var(--text2);font-size:13px;margin-top:2px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px}
